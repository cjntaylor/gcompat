name: build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v4

      - name: Bake and push
        uses: docker/bake-action@v7

      - name: Generate archives
        run: |
          tar -C out/linux_arm64 -cJf gcompat-${{ github.ref_name }}-arm64.tar.xz $(find out/linux_arm64 -mindepth 1 -maxdepth 1 -printf " %P")
          tar -C out/linux_riscv64 -cJf gcompat-${{ github.ref_name }}-riscv64.tar.xz $(find out/linux_riscv64 -mindepth 1 -maxdepth 1 -printf " %P")
      
      - name: Publish release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: gcompat*.tar.xz